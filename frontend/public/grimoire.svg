<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#1a1a2e"/>
  <!-- Book cover -->
  <rect x="18" y="20" width="64" height="62" rx="5" fill="#1f1f38" stroke="#8b7635" stroke-width="2"/>
  <!-- Spine -->
  <rect x="18" y="22" width="8" height="58" fill="#8b7635"/>
  <line x1="19" y1="34" x2="25" y2="34" stroke="#e8c55a" stroke-width="1"/>
  <line x1="19" y1="42" x2="25" y2="42" stroke="#e8c55a" stroke-width="1"/>
  <line x1="19" y1="50" x2="25" y2="50" stroke="#e8c55a" stroke-width="1"/>
  <line x1="19" y1="58" x2="25" y2="58" stroke="#e8c55a" stroke-width="1"/>
  <!-- Inner border -->
  <rect x="32" y="26" width="44" height="50" rx="3" fill="none" stroke="#8b7635" stroke-width="1"/>
  <!-- Pentagram circle -->
  <circle cx="54" cy="46" r="12" fill="none" stroke="#c9a84c" stroke-width="1.2"/>
  <!-- Star points at angles -90, -18, 54, 126, 198 degrees -->
  <polygon points="54,34 56.7,42.3 65.4,42.3 58.4,47.4 61,55.8 54,50.7 47,55.8 49.6,47.4 42.6,42.3 51.3,42.3" fill="none" stroke="#e8c55a" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- G -->
  <text x="54" y="70" font-size="12" text-anchor="middle" font-family="serif" font-weight="bold" fill="#e8c55a">G</text>
</svg>
