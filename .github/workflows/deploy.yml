# =============================================================================
# deploy.yml — Deploys to production on push to main
# =============================================================================
# This workflow runs after a PR is merged to main. It:
#   1. Applies any Terraform infrastructure changes
#   2. Builds and deploys the backend (Lambda)
#   3. Builds and deploys the frontend (S3 + CloudFront)
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]

# Only one deploy can run at a time. If a second push to main happens while
# a deploy is in progress, it queues up rather than running in parallel.
# This prevents race conditions in Terraform state.
concurrency:
  group: deploy-prod
  cancel-in-progress: false  # Don't cancel in-progress deploys

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Apply Terraform changes
  # ---------------------------------------------------------------------------
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      # Use the prod state key — separate from dev so they don't interfere
      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend-config="key=grimoire/prod/terraform.tfstate"

      - name: Terraform Apply
        working-directory: infra
        run: |
          terraform apply -var-file="environments/prod.tfvars" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="vapid_public_key=${{ secrets.VAPID_PUBLIC_KEY }}" \
            -var="vapid_private_key=${{ secrets.VAPID_PRIVATE_KEY }}" \
            -auto-approve

  # ---------------------------------------------------------------------------
  # Job 2: Build and deploy the backend (Lambda)
  # ---------------------------------------------------------------------------
  # Bundles the Node.js code with esbuild, zips it, and uploads to Lambda.
  # esbuild bundles all our source files + node_modules into a single file,
  # which means faster Lambda cold starts (one file to load, not hundreds).
  # ---------------------------------------------------------------------------
  backend:
    name: Deploy Backend
    needs: [terraform]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: backend/.nvmrc
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - uses: hashicorp/setup-terraform@v3

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Package
        working-directory: backend
        run: cd dist && zip -j ../lambda.zip index.mjs

      - name: Get Lambda function name
        id: tf
        working-directory: infra
        run: |
          terraform init -backend-config="key=grimoire/prod/terraform.tfstate"
          echo "function_name=$(terraform output -raw lambda_function_name)" >> "$GITHUB_OUTPUT"

      - name: Deploy to Lambda
        working-directory: backend
        run: |
          aws lambda update-function-code \
            --function-name ${{ steps.tf.outputs.function_name }} \
            --zip-file fileb://lambda.zip \
            --output text --query 'LastUpdateStatus'

  # ---------------------------------------------------------------------------
  # Job 3: Build and deploy the frontend
  # ---------------------------------------------------------------------------
  frontend:
    name: Deploy Frontend
    needs: [terraform]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - uses: hashicorp/setup-terraform@v3

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Get Terraform Outputs
        id: tf
        working-directory: infra
        run: |
          terraform init -backend-config="key=grimoire/prod/terraform.tfstate"
          echo "bucket=$(terraform output -raw frontend_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Sync to S3
        working-directory: frontend
        run: aws s3 sync dist/ s3://${{ steps.tf.outputs.bucket }} --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf.outputs.distribution_id }} \
            --paths "/*"
